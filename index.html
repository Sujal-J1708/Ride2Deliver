Book a Delivery
</h2>

<form action="YOUR_FORMSPREE_LINK" method="POST" class="bg-white shadow-lg rounded-xl p-8 space-y-4">

<input type="text" name="name" placeholder="Sender Name" required class="w-full border p-3 rounded">

<input type="tel" name="phone" placeholder="Phone Number" required class="w-full border p-3 rounded">

<input type="text" name="pickup" placeholder="Pickup Address" required class="w-full border p-3 rounded">

<input type="text" name="drop" placeholder="Delivery Address" required class="w-full border p-3 rounded">

<select name="item" class="w-full border p-3 rounded">

<option>Medicine</option>
<option>Document</option>
<option>Small Parcel</option>

</select>

<textarea name="notes" placeholder="Special Instructions" class="w-full border p-3 rounded"></textarea>

<button class="bg-red-600 text-white px-6 py-3 rounded-md hover:bg-red-700 w-full">
Submit Delivery Request
</button>

</form>

</section>
